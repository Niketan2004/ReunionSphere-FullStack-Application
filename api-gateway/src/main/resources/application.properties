spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true

# Gateway Discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# User Service
spring.cloud.gateway.server.webflux.routes[0].id=user-service-users
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.server.webflux.routes[1].id=user-service-subscriptions
spring.cloud.gateway.server.webflux.routes[1].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/subscriptions/**

spring.cloud.gateway.server.webflux.routes[2].id=user-service-locations
spring.cloud.gateway.server.webflux.routes[2].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/locations/**

# Auth Service
spring.cloud.gateway.server.webflux.routes[3].id=auth-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/auth/**

# Lost & Found Service
spring.cloud.gateway.server.webflux.routes[4].id=lost-and-found-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://lost-and-found-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/reports/**

logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.cloud.loadbalancer=DEBUG

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET:8mB8Y4M5rL8mN2vA7sK4hQ6dF1gJ9xT3uC5eW7rP2zY6nL0kB1}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# Swagger
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# Logging
# ==========================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.cloud.loadbalancer=INFO