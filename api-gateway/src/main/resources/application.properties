spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Discovery
spring.cloud.gateway.mvc.discovery.locator.enabled=true
spring.cloud.gateway.mvc.discovery.locator.lower-case-service-id=true

# User Routes
spring.cloud.gateway.mvc.routes[0].id=user-route
spring.cloud.gateway.mvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.mvc.routes[1].id=subscription-route
spring.cloud.gateway.mvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/v1/subscriptions/**

spring.cloud.gateway.mvc.routes[2].id=location-route
spring.cloud.gateway.mvc.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/v1/locations/**

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG