# ==========================================
# Application
# ==========================================
spring.application.name=${APPLICATION_NAME:auth-service}
server.port=${SERVER_PORT:8082}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================================
# MySQL Database
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://${HOST_NAME:localhost}:${PORT:3306}/reunionSphere_auth_service_DB?createDatabaseIfNotExist=true}
spring.datasource.username=${SQL_USERNAME:root}
spring.datasource.password=${SQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect



# ==========================================
# Google OAuth2
# ==========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET:8mB8Y4M5rL8mN2vA7sK4hQ6dF1gJ9xT3uC5eW7rP2zY6nL0kB1}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# REDIS CACHE
# ==========================================
spring.cache.type=${CACHE_TYPE:redis}
spring.data.redis.host= ${CACHE_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ==========================================
# Frontend
# ==========================================
frontend.url=${FRONTEND_URL:http://localhost:5173}


# ==========================================
# Logging
# ==========================================
logging.level.org.springframework.security=ALL

# ==========================================
# SWAGGER
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics

# ==========================================
# LOGGING
# ==========================================
logging.level.com.reunionsphere.authservice=DEBUG
logging.level.org.springframework.data.jpa=INFO

# TimeZone
spring.jackson.time-zone=Asia/Kolkata