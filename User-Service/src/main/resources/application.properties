spring.application.name=User-Service
server.port=8081
# eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# eureka.instance.prefer-ip-address=true

# Database Configuration
spring.datasource.url=jdbc:mysql://${HOST_NAME:localhost}:${PORT :3306}/reunionSphere_UserService?createDatabaseIfNotExist=true
spring.datasource.username=${SQL_USERNAME:root}
spring.datasource.password=${SQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Jackson Configuration (JSON handling)
# spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# Redis Cache
spring.cache.type=${CACHE_TYPE:redis}
spring.data.redis.host= ${CACHE_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Cloudinary Configs
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB