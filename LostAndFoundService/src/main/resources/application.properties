# spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# spring.kafka.consumer.properties.spring.json.trusted.packages=*


# ==========================================
# FEIGN CLIENTS
# ==========================================
services.user-service.url=${USER_SERVICE_URL}
services.notification-service.url=${NOTIFICATION_SERVICE_URL}
services.subscription-service.url=${SUBSCRIPTION_SERVICE_URL}

# ==========================================
# SWAGGER
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics

# ==========================================
# LOGGING
# ==========================================
logging.level.com.reunionsphere.lostfound=DEBUG
logging.level.org.springframework.data.mongodb=INFO

# TimeZone
spring.jackson.time-zone=Asia/Kolkata

