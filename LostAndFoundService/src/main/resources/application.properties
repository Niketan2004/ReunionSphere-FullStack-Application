# ==========================================
# APPLICATION CONFIG
# ==========================================
spring.application.name=lost-and-found-service
server.port=${SERVER_PORT:8083}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================================
# MONGODB
# ==========================================
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ReunionSphere_LostAndFoundService}
spring.mongodb.database=${MONGODB_DATABASE:Report_Db}

# ==========================================
# CLOUDINARY
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ==========================================
# REDIS CACHE
# ==========================================
spring.cache.type=${CACHE_TYPE:redis}
spring.data.redis.host= ${CACHE_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ==========================================
# MULTIPART FILE CONFIG
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ==========================================
# KAFKA
# ==========================================
# spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# spring.kafka.consumer.group-id=lost-found-group
