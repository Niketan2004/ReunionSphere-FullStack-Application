# ==========================================
# APPLICATION CONFIG
# ==========================================
spring.application.name=LostAndFoundService
server.port=${SERVER_PORT:8083}

# ==========================================
# MONGODB
# ==========================================
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ReuinonSphere_LostAndFoundService}
spring.mongodb.database=${MONGODB_DATABASE:Report_Db}

# ==========================================
# CLOUDINARY
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ==========================================
# REDIS CACHE
# ==========================================
spring.cache.type=${CACHE_TYPE:redis}
spring.data.redis.host= ${CACHE_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ==========================================
# MULTIPART FILE CONFIG
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

